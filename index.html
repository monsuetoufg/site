<!DOCTYPE html>

<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel de Indicadores</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f7fa;
      color: #333;
    }

    header {
      background-color: #1f2937;
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    header p {
      margin-top: 5px;
      font-size: 14px;
      color: #cbd5e1;
    }

    .container {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin-top: 0;
    }

    iframe {
      width: 100%;
      height: 600px;
      border: none;
      border-radius: 8px;
      margin-top: 15px;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #666;
    }

    @media (max-width: 768px) {
      iframe {
        height: 500px;
      }
    }
  </style>

</head>

<body>

  <header>
    <h1>Painel de Indicadores</h1>
    <p>Visualização interativa de dados atualizados</p>
  </header>

  <div class="container">

```
<div class="card">
  <h2>Dashboard Principal</h2>
  <p>Explore os dados utilizando os filtros disponíveis no painel abaixo.</p>

  <iframe 
    src="COLE_AQUI_SEU_LINK_DO_POWER_BI"
    allowFullScreen="true">
  </iframe>
</div>
```

  <footer>
    © 2026 - Seu Projeto | Dados atualizados automaticamente
  </footer>

</body>
</html>
