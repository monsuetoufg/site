<!DOCTYPE html>

<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel de Indicadores</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f7fa;
      color: #333;
    }

    header {
      background-color: #111827;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 20px;
    }

    nav button {
      background: none;
      border: none;
      color: white;
      margin-left: 15px;
      cursor: pointer;
      font-size: 14px;
    }

    nav button:hover {
      text-decoration: underline;
    }

    .hero {
      text-align: center;
      padding: 40px 20px;
      background: #e5e7eb;
    }

    .hero h2 {
      margin: 0;
      font-size: 26px;
    }

    .container {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    iframe {
      width: 100%;
      height: 650px;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #666;
    }
  </style>

  <script>
    function trocarDashboard(link) {
      document.getElementById("dashboardFrame").src = link;
    }
  </script>

</head>

<body>

  <header>
    <h1>Painel de Indicadores</h1>
    <nav>
      <button onclick="trocarDashboard('LINK_DASHBOARD_1')">Visão Geral</button>
      <button onclick="trocarDashboard('LINK_DASHBOARD_2')">Detalhes</button>
      <button onclick="trocarDashboard('LINK_DASHBOARD_3')">Séries Temporais</button>
    </nav>
  </header>

  <div class="hero">
    <h2>Visualização Interativa de Dados</h2>
    <p>Explore os indicadores utilizando os menus acima</p>
  </div>

  <div class="container">
    <div class="card">
      <h3>Dashboard</h3>

```
  <iframe 
    id="dashboardFrame"
    src="LINK_DASHBOARD_1"
    allowFullScreen="true">
  </iframe>

</div>
```

  </div>

  <footer>
    © 2026 - Seu Projeto | Dados atualizados automaticamente
  </footer>

</body>
</html>
