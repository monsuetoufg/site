<!DOCTYPE html>

<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel de Indicadores</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #f1f5f9;
      color: #1f2937;
    }

    /* Barra superior institucional */
    .topbar {
      background-color: #0b3d91;
      color: white;
      padding: 8px 20px;
      font-size: 13px;
    }

    /* Cabeçalho */
    header {
      background-color: white;
      border-bottom: 1px solid #ddd;
      padding: 15px 20px;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
      color: #0b3d91;
    }

    header p {
      margin: 5px 0 0;
      font-size: 14px;
      color: #555;
    }

    /* Navegação */
    nav {
      background-color: #0b3d91;
      padding: 10px 20px;
    }

    nav button {
      background: none;
      border: none;
      color: white;
      margin-right: 20px;
      font-size: 14px;
      cursor: pointer;
    }

    nav button:hover {
      text-decoration: underline;
    }

    /* Conteúdo */
    .container {
      max-width: 1200px;
      margin: 25px auto;
      padding: 0 20px;
    }

    .card {
      background: white;
      border-radius: 6px;
      padding: 20px;
      border: 1px solid #ddd;
    }

    .card h2 {
      margin-top: 0;
      color: #0b3d91;
    }

    iframe {
      width: 100%;
      height: 650px;
      border: none;
      margin-top: 15px;
    }

    /* Rodapé */
    footer {
      background-color: #0b3d91;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 12px;
      margin-top: 40px;
    }
  </style>

  <script>
    function trocarDashboard(link) {
      document.getElementById("dashboardFrame").src = link;
    }
  </script>

</head>

<body>

  <div class="topbar">
    Portal de Dados Públicos
  </div>

  <header>
    <h1>Painel de Indicadores</h1>
    <p>Plataforma de visualização e monitoramento de dados</p>
  </header>

  <nav>
    <button onclick="trocarDashboard('LINK_DASHBOARD_1')">Visão Geral</button>
    <button onclick="trocarDashboard('LINK_DASHBOARD_2')">Indicadores Detalhados</button>
    <button onclick="trocarDashboard('LINK_DASHBOARD_3')">Séries Históricas</button>
  </nav>

  <div class="container">
    <div class="card">
      <h2>Dashboard</h2>
      <p>Utilize os botões acima para navegar entre os painéis disponíveis.</p>

```
  <iframe 
    id="dashboardFrame"
    src="LINK_DASHBOARD_1"
    allowFullScreen="true">
  </iframe>
</div>
```

  </div>

  <footer>
    © 2026 - Instituição Responsável | Dados públicos e atualizados periodicamente
  </footer>

</body>
</html>
